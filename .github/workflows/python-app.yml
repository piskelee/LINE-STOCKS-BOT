name: Schedule Test

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Show Schedule Info
        run: |
          echo "=================================="
          echo "Workflow is running!"
          echo "Event Name : ${{ github.event_name }}"
          echo "Schedule   : ${{ github.event.schedule }}"
          date
          echo "=================================="
